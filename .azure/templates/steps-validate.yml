parameters:
  - name: serviceConnection
    type: string
  - name: tfVarsFile
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: backendContainer
    type: string
  - name: backendKey
    type: string
    default: networking.tfstate

steps:
  - task: AzureCLI@2
    displayName: Terraform Init
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      workingDirectory: $(Build.SourcesDirectory)/infra
      inlineScript: |
        export ARM_CLIENT_ID=$servicePrincipalId
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export ARM_TENANT_ID=$tenantId
        export ARM_USE_OIDC=true
        export ARM_OIDC_TOKEN=$idToken

        terraform init \
          -backend-config="resource_group_name=${{ parameters.backendResourceGroup }}" \
          -backend-config="storage_account_name=${{ parameters.backendStorageAccount }}" \
          -backend-config="container_name=${{ parameters.backendContainer }}" \
          -backend-config="key=${{ parameters.backendKey }}"

  - task: AzureCLI@2
    displayName: Terraform Validate
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      workingDirectory: $(Build.SourcesDirectory)/infra
      inlineScript: |
        export ARM_CLIENT_ID=$servicePrincipalId
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export ARM_TENANT_ID=$tenantId
        export ARM_USE_OIDC=true
        export ARM_OIDC_TOKEN=$idToken

        terraform validate

  - task: AzureCLI@2
    displayName: Terraform Plan (What-If)
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      workingDirectory: $(Build.SourcesDirectory)/infra
      inlineScript: |
        export ARM_CLIENT_ID=$servicePrincipalId
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export ARM_TENANT_ID=$tenantId
        export ARM_USE_OIDC=true
        export ARM_OIDC_TOKEN=$idToken

        terraform plan \
          -var-file="environments/${{ parameters.tfVarsFile }}" \
          -out=tfplan \
          -detailed-exitcode
