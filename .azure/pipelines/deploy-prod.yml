trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  - group: vg-networking-prod
  TF_VERSION: "1.8.5"

stages:
  - stage: Validate
    displayName: Terraform Plan (prod)
    jobs:
      - job: TerraformPlan
        steps:
          - task: Bash@3
            displayName: Install Terraform
            inputs:
              targetType: inline
              script: |
                wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
                unzip -q terraform_$(TF_VERSION)_linux_amd64.zip
                sudo mv terraform /usr/local/bin/
                terraform version

          - template: ../templates/steps-validate.yml
            parameters:
              serviceConnection: sc-azure-prod
              tfVarsFile: prod.tfvars
              backendResourceGroup: $(tf_resource_group)
              backendStorageAccount: $(tf_storage_account)
              backendContainer: $(tf_container)

  - stage: Deploy_Prod
    displayName: Deploy to Production
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - deployment: DeployNetworking
        displayName: Terraform Apply — prod
        environment: prod                   # approval gate configured in ADO
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: Bash@3
                  displayName: Install Terraform
                  inputs:
                    targetType: inline
                    script: |
                      wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
                      unzip -q terraform_$(TF_VERSION)_linux_amd64.zip
                      sudo mv terraform /usr/local/bin/
                      terraform version

                - template: ../../templates/steps-deploy.yml
                  parameters:
                    serviceConnection: sc-azure-prod
                    tfVarsFile: prod.tfvars
                    backendResourceGroup: $(tf_resource_group)
                    backendStorageAccount: $(tf_storage_account)
                    backendContainer: $(tf_container)
